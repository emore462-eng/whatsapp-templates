<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantillas WhatsApp</title>
  <link rel="icon" href="whatsapp-logo.ico"></link>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6">
  <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">Mis Plantillas</h1>

  <!-- Dos columnas: formulario a la izquierda, tarjetas a la derecha -->
  <div class="max-w-5xl mx-auto grid gap-6 md:grid-cols-[320px_1fr]">

    <!-- Columna izquierda: acciones (formulario + generador) -->
    <div class="grid gap-6 self-start">

      <form id="form-plantilla" class="bg-white p-4 rounded-xl shadow grid gap-2">
        <input id="titulo"  type="text" placeholder="Título"  class="p-2 border border-slate-300 rounded">
        <input id="hashtag" type="text" placeholder="hashtag" class="p-2 border border-slate-300 rounded">
        <textarea id="mensaje" rows="3" placeholder="Mensaje (usa {nombre} y {producto})" class="p-2 border border-slate-300 rounded"></textarea>
        <div class="grid grid-cols-2 gap-2">
          <button id="btn-guardar" class="bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded transition">Agregar plantilla</button>
          <!-- Logro 1 (C14): Cancelar edición -->
          <button id="btn-cancelar" type="button" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 py-2 rounded transition">Cancelar</button>
        </div>
      </form>

      <!-- Generador de mensaje (C13 HU4) -->
      <section id="generador" class="bg-white p-4 rounded-xl shadow grid gap-3">
        <h2 class="font-bold text-slate-800">✨ Usar plantilla</h2>

        <label class="grid gap-1 text-xs text-slate-500">
          Plantilla
          <select id="selector" class="p-2 border border-slate-300 rounded text-slate-800"></select>
        </label>

        <label class="grid gap-1 text-xs text-slate-500">
          Nombre real
          <input id="valorNombre" type="text" placeholder="ej. Ana" class="p-2 border border-slate-300 rounded text-slate-800">
        </label>

        <label class="grid gap-1 text-xs text-slate-500">
          Producto (opcional)
          <input id="valorProducto" type="text" placeholder="ej. Zapatillas" class="p-2 border border-slate-300 rounded text-slate-800">
        </label>

        <button id="btn-generar" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded transition">Generar</button>

        <div class="bg-slate-50 border border-slate-200 rounded p-3 grid gap-2">
          <p id="mensaje-final" class="text-sm text-slate-700 whitespace-pre-wrap min-h-[1.5rem]"></p>
          <button id="btn-copiar" class="justify-self-end text-xs text-emerald-700 hover:text-emerald-800">📋 Copiar</button>
        </div>
      </section>

    </div>

    <!-- Columna derecha: buscador + estadísticas + tarjetas, todo dentro de UN contenedor -->
    <div class="grid gap-4 content-start">

      <!-- HU4 (C14): buscador por hashtag -->
      <input id="buscador" type="text" placeholder="Filtra por hashtag…"
             class="w-full p-2 border border-slate-300 rounded-lg">

      <!-- HU3 (C14): panel de estadísticas -->
      <aside id="panel-stats" class="bg-slate-100 rounded-lg p-3"></aside>

      <ul id="listaPlantillas" class="grid gap-3 sm:grid-cols-2"></ul>
   
      <!-- HU4 (C15): indicador de guardado + vaciar todo -->
      <div class="flex items-center justify-between border-t border-slate-200 pt-3">
        <p id="estado" class="text-xs text-slate-500 bg-slate-100 px-2.5 py-1 rounded-full">Listo</p>
        <button id="btn-vaciar" class="text-xs px-3 py-1.5 rounded-md border border-red-200 text-red-600 hover:bg-red-50 transition">Vaciar todo</button>
      </div>
    
    </div>

  </div>

  <script src="js/models/Template.js"></script>
  <script src="js/persistence.js"></script> 
  <script src="js/app.js"></script>
</body>
</html>
